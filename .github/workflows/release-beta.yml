name: 🚀 Release Beta

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/effectify"

jobs:
  release-beta:
    name: 🚀 Release Beta
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed for git operations
      id-token: write # Needed for npm provenance
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: effectify
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      # Setup
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed for nx affected
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org/"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔧 Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # Detect affected projects (exit early if none)
      - name: 🔍 Detect Affected Release Projects
        id: affected
        run: |
          # Get all release projects from nx.json (these are paths like "packages/solid/query")
          RELEASE_PATHS=$(jq -r '.release.projects[]' nx.json | sort | uniq)
          echo "📋 Release project paths:"
          echo "$RELEASE_PATHS"
          echo ""

          # Convert paths to project names
          RELEASE_PROJECTS=""
          for path in $RELEASE_PATHS; do
            PROJECT_NAME=$(pnpm nx show project "$path" --json 2>/dev/null | jq -r '.name' 2>/dev/null)
            if [ -n "$PROJECT_NAME" ] && [ "$PROJECT_NAME" != "null" ]; then
              RELEASE_PROJECTS="$RELEASE_PROJECTS $PROJECT_NAME"
            fi
          done
          RELEASE_PROJECTS=$(echo "$RELEASE_PROJECTS" | tr ' ' '\n' | sort | uniq)
          echo "📋 Release project names:"
          echo "$RELEASE_PROJECTS"
          echo ""

          # Get affected projects since last push to dev
          AFFECTED_RAW=$(pnpm nx show projects --affected --base=origin/dev~1 --head=HEAD --json 2>/dev/null || echo "[]")
          echo "🔍 All affected projects:"
          echo "$AFFECTED_RAW" | jq -r '.[]' 2>/dev/null || echo "(none)"
          echo ""

          # Filter affected projects that are in release list
          AFFECTED_RELEASE_PROJECTS=$(echo "$AFFECTED_RAW" | jq -r --arg release "$RELEASE_PROJECTS" '[.[] | select(. as $p | $release | contains($p))] | join(",")' 2>/dev/null || echo "")

          if [ -z "$AFFECTED_RELEASE_PROJECTS" ] || [ "$AFFECTED_RELEASE_PROJECTS" = "null" ]; then
            echo "⚠️ No affected release projects found - skipping release"
            echo "has_projects=false" >> $GITHUB_OUTPUT
            echo "projects=" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "✅ Affected release projects: $AFFECTED_RELEASE_PROJECTS"
            echo "has_projects=true" >> $GITHUB_OUTPUT
            echo "projects=$AFFECTED_RELEASE_PROJECTS" >> $GITHUB_OUTPUT
          fi

      # Build affected projects (skipped if no affected projects)
      - name: 🏗️ Build Affected Projects
        if: ${{ steps.affected.outputs.has_projects == 'true' }}
        run: |
          echo "Building: ${{ steps.affected.outputs.projects }}"
          pnpm nx run-many -t build --projects=${{ steps.affected.outputs.projects }} --parallel=3

      # Optional: Test affected projects
      - name: 🧪 Test Affected Projects
        if: ${{ steps.affected.outputs.has_projects == 'true' }}
        continue-on-error: true
        run: |
          echo "Testing: ${{ steps.affected.outputs.projects }}"
          pnpm nx run-many -t test --projects=${{ steps.affected.outputs.projects }} --parallel=3 --passWithNoTests || true

      # Release: version bump + publish (skipped if no affected projects)
      - name: 🚀 Version & Publish Beta
        if: ${{ steps.affected.outputs.has_projects == 'true' }}
        run: |
          PROJECTS="${{ steps.affected.outputs.projects }}"
          echo "Releasing: $PROJECTS"

          # Version bump with preid=beta → creates versions like 0.0.5-beta.0
          pnpm nx release version --projects=$PROJECTS --preid=beta

          # Rebuild with new versions (version bump updates package.json)
          pnpm nx run-many -t build --projects=$PROJECTS --parallel=3

          # Publish to npm with beta tag
          pnpm nx release publish --projects=$PROJECTS --tag=beta

          # Push git tags and version commits
          git push origin HEAD --follow-tags
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      # Summary
      - name: 📊 Release Summary
        if: always()
        run: |
          echo "## 🚀 Beta Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.affected.outputs.has_projects }}" = "true" ]; then
            echo "✅ **Release Completed**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Projects:** ${{ steps.affected.outputs.projects }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| Detect Affected | ✅ |" >> $GITHUB_STEP_SUMMARY
            echo "| Build | ✅ |" >> $GITHUB_STEP_SUMMARY
            echo "| Version Bump | ✅ With preid=beta |" >> $GITHUB_STEP_SUMMARY
            echo "| NPM Tag | beta |" >> $GITHUB_STEP_SUMMARY
            echo "| Provenance | ✅ Enabled |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📦 Packages published with \"@beta\" dist-tag and semver prerelease versions (x.x.x-beta.x)." >> $GITHUB_STEP_SUMMARY
          else
            echo "⏭️ **Skipped - No affected projects**" >> $GITHUB_STEP_SUMMARY
          fi
