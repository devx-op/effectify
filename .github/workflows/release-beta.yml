name: 🚀 Release Beta

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/effectify"

jobs:
  # Run tests before releasing
  test:
    name: 🧪 Test & Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: effectify
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔧 Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: 🏗️ Build release projects
        run: |
          pnpm nx run-many -t build -p @effectify/react-query @effectify/solid-query --parallel=3

      - name: 🧪 Test release projects
        run: |
          pnpm nx run-many -t test -p @effectify/react-query @effectify/solid-query --parallel=3 --passWithNoTests || true

      - name: 🚀 Version Beta Packages
        run: |
          # Create beta version
          pnpm exec nx release version --projects=@effectify/react-query,@effectify/solid-query --preid=beta --yes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Publish Beta Packages
        run: |
          # Publish with beta tag
          pnpm exec nx release publish --projects=@effectify/react-query,@effectify/solid-query --tag=beta --yes
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📊 Release Summary
        if: always()
        run: |
          echo "## 🚀 Beta Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Release Completed**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Projects:** @effectify/react-query, @effectify/solid-query" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Version Bump | ✅ With --preid=beta |" >> $GITHUB_STEP_SUMMARY
          echo "| NPM Tag | beta |" >> $GITHUB_STEP_SUMMARY
          echo "| Provenance | ✅ Enabled |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 Packages published with \"@beta\" dist-tag." >> $GITHUB_STEP_SUMMARY
